<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Travel Form</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-KK94CHFLLe+nY2dmCWGMq91rCGa5gtU4mk92HdvYe+M/SXH301p5ILy+dN9+nJOZ"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <header>
      <h1 id="title" class="text-center">Formulário Trybe Travel</h1>
    </header>

      <form id="main-form" class="container">
        <fieldset>
          <div class="row g-3">
            <div class="col">
            <label for="fullName" class="form-label">Nome Completo:</label>
            <input
              type="text"
              name="name"
              class="form-control"
              id="fullName"
              minlength="10"
              maxlength="40"
            />
          </div>
  
          <div class="col">
            <label for="email" class="form-label">Email</label>
            <input
              type="email"
              name="email"
              class="form-control"
              id="email"
              minlength="10"
              maxlength="50"
            />
          </div>
  
          <div class="form-check">
            <label for="cidade" class="form-check-label">Cidade</label>
            <input
              type="radio"
              name="destinations"
              class="form-check-input"
              id="cidade"
              value="Cidade"
            />
          </div>
  
          <div class="form-check">
            <label for="campo" class="form-check-label">Campo</label>
            <input
              type="radio"
              name="destinations"
              class="form-check-input"
              id="campo"
              value="Campo"
            />
          </div>
  
          <div class="form-check">
            <label for="praia" class="form-check-label">Praia</label>
            <input
              type="radio"
              name="destinations"
              class="form-check-input"
              id="praia"
              value="Praia"
            />
          </div>
  
          <div class="form-check">
            <label for="montanha" class="form-check-label">Montanha</label>
            <input
              type="radio"
              name="destinations"
              class="form-check-input"
              class="form-check-label"
              id="montanha"
              value="Montanha"
            />
          </div>
  
          <div class="mb-3">
            <label for="question" class="form-label"
              >Por que você deveria ser a pessoa desenvolvedora a ganhar o
              concurso TrybeTrip?</label
            >
            <textarea
              name="quetion"
              class="form-control"
              id="question"
              cols="30"
              rows="10"
              minlength="1"
              maxlength="500"
            ></textarea>
          </div>
  
          <div class="mb-3">
            <label for="date" class="form-label"
              >Qual a melhor data para realizar sua viagem?</label
            >
            <input type="date" name="date" class="form-control" id="date" />
          </div>
  
          <div class="form-check">
            <label for="promo" class="form-check-label"
              >Gostaria de receber outras incríveis oportunidades oferecidas pela
              Trybe?</label
            >
            <input
              type="checkbox"
              name="promo"
              class="form-check-input"
              id="promo"
            />
          </div>
  
          <div class="form-check">
            <label for="agreement" class="form-check-label"
              >Concordo que imagens das minhas férias poderão ser usadas na
              divulgação de concursos futuros.</label
            >
            <input
              type="checkbox"
              name="agreement"
              class="form-check-input"
              id="agreement"
            />
          </div>

        </fieldset>
  
          <button
            type="submit"
            id="submit-btn"
            class="btn btn-secondary"
            disabled
          >
            Enviar
          </button>
  
          <button type="reset" id="clear-btn" class="btn btn-danger">
            Limpar
          </button>
        
      </form>
    <script src="script.js"></script>
  </body>
</html>
