<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Exercício</title>
    <style>
      section {
        border-color: black;
        border-style: solid;
      }

      .title {
        text-align: center;
      }

      .main-content {
        background-color: yellow;
      }

      .main-content .center-content {
        background-color: red;
        width: 50%;
        margin-left: auto;
        margin-right: auto;
      }

      .main-content .center-content p {
        font-style: italic;
      }

      .main-content .left-content {
        background-color: green;
        width: 60%;
        margin-left: 0;
        margin-right: auto;
      }

      .main-content .left-content .small-image {
        display: block;
        margin-left: auto;
        margin-right: auto;
        border-radius: 100%;
      }

      .main-content .right-content {
        background-color: blue;
        width: 60%;
        margin-left: auto;
        margin-right: 0;
      }

      .main-content .description {
        text-align: center;
      }
    </style>
  </head>
  <body>
    <script>
        // Adicione a tag h1 com o texto TrybeTrip - Agência de Viagens como filho da tag body;
        const elementH1 = document.createElement('h1');
        elementH1.innerText = 'TrybeTrip - Agência de Viagens';
        document.body.appendChild(elementH1);

        // Adicione a tag main com a classe main-content como filho da tag body;
        const elementMain = document.createElement('main');
        elementMain.className = 'main-content';
        document.body.appendChild(elementMain);

        // Adicione a tag section com a classe center-content como filho da tag main criada no passo 2;
        const elementSection = document.createElement('section');
        elementSection.className = ('center-content');
        elementMain.appendChild(elementSection);

        // Adicione a tag p como filho do section criado no passo 3 e coloque algum texto;
        const elementP = document.createElement('p');
        elementP.innerText = 'Sua segurança é nossa maior prioridade';
        elementSection.appendChild(elementP);

        // Adicione a tag section com a classe left-content como filho da tag main criada no passo 2;
        const elementSection2 = document.createElement('section');
        elementSection2.className = 'left-content';
        elementMain.appendChild(elementSection2);

        // Adicione a tag section com a classe right-content como filho da tag main criada no passo 2;
        const elementSection3 = document.createElement('section');
        elementSection3.className = 'right-content';
        elementMain.appendChild(elementSection3);

        // Adicione uma imagem com src configurado para valor https://picsum.photos/200 e classe small-image. Esse elemento deve ser filho do section criado no passo 5;
        const img = document.createElement('img');
        img.className = 'small-image';
        img.src = 'https://picsum.photos/200';
        elementSection2.appendChild(img);

        // Adicione uma lista não ordenada com os valores de 1 a 10 por extenso, ou seja, um, dois, três, e assim por diante. Essa lista deve ser filha do section criado no passo 6;
        const ul = document.createElement('ul');
        const numbersExtenso = ['um', 'dois', 'três', 'quatro', 'cinco', 'seis', 'sete', 'oito', 'nove', 'dez'];
        for(let index = 0; index < numbersExtenso.length; index += 1) {
            const li = document.createElement('li');
            li.innerText = numbersExtenso[index];
            ul.appendChild(li);
        }
        elementSection3.appendChild(ul);

        // Adicione 3 tags h3, todas filhas do main criado no passo 2.
        const mensenger = ['Escolha', 'A', 'TrybeTrip'];
        for (let index = 0; index < 3; index += 1) {
            const h3 = document.createElement('h3');
            h3.innerText = mensenger[index];
            console.log(index);
            elementMain.appendChild(h3);
        }

        // Adicione a classe title na tag h1 criada;
        elementH1.className = 'title';

        // Adicione a classe description nas 3 tags h3 criadas;
        const h3 = document.getElementsByTagName('h3');
        for (let index = 0; index < h3.length; index += 1) {
            h3[index].className = 'description';
        }

        // Remova a section criada no passo 5 (aquela que possui a classe left-content) por meio da função .removeChild();
        elementMain.removeChild(elementSection2);

        // Centralize a section criada no passo 6 (aquela que possui a classe right-content).
        elementSection3.style.marginRight = 'auto';

        // Troque a cor de fundo do elemento-pai da section criada no passo 3 (aquela que possui a classe center-content) para a cor verde;
        elementSection.parentElement.style.backgroundColor = 'green';

        // Remova os dois últimos elementos (nove e dez) da lista criada no passo 8.
        console.log(ul.lastElementChild.removeChild)
        ul.lastElementChild.remove();
        ul.lastElementChild.remove();
    </script>
  </body>
</html>
