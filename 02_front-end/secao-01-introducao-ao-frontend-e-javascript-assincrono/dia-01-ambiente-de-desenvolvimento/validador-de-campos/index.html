<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Validador de Campos</title>
</head>

<body>
  <header>
    <h1>Validador de Campos</h1>
  </header>

  <main class="container">
    
    <form>
      <input id="input-value" type="text" placeholder="Digite aqui">

      <select id="field" name="field">
        <option value="email">Email</option>
        <option value="cpf">CPF</option>
        <option value="rgb">RGB</option>
        <option value="uuid">UUID</option>
        <option value="url">URL</option>
      </select>

      <button id="btn-validate">Validar</button>
    </form>
    <p id="validate-text">Digite o valor, escolha a opção e clique em validar</p>
  </main>
  <script type="module" src="./src/main.js"></script>
</body>

</html>
